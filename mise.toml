[settings]
lockfile = true

[tools]
rust = { version = "latest", components = "rustfmt,clippy" }
ruby = { version = "latest" }
"cargo:cargo-ndk" = "latest"
"cargo:cbindgen" = "latest"

[tasks.check]
description = "Check the full Rust workspace with all features enabled"
run = "bash -lc 'set -euo pipefail; cargo check --workspace --all-features --locked; mkdir -p target/debug; touch target/debug/.cargo-check-stamp'"
sources = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs", "crates/**/Cargo.toml"]
outputs = ["target/debug/.cargo-check-stamp"]

[tasks.test]
description = "Run all workspace tests with all features enabled"
depends = ["check"]
run = "cargo test --workspace --all-features --locked"
sources = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs", "crates/**/Cargo.toml"]

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"
sources = ["crates/**/*.rs"]

[tasks.clippy]
description = "Run clippy across the full workspace"
run = "cargo clippy --workspace --all-targets --all-features --locked -- -D warnings -A clippy::missing_errors_doc -A clippy::missing_panics_doc -A clippy::must_use_candidate"
sources = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs", "crates/**/Cargo.toml"]

[tasks."build:desktop"]
description = "Build all workspace crates for the current desktop host"
depends = ["header"]
run = "cargo build --workspace --all-features --release --locked"
sources = ["Cargo.toml", "Cargo.lock", "crates/**/*.rs", "crates/**/Cargo.toml", "include/takanawa.h"]

[tasks.header]
description = "Generate the public C header with cbindgen"
run = "cbindgen --config cbindgen.toml --crate takanawa-ffi --output include/takanawa.h"
sources = ["crates/takanawa-ffi/src/**/*.rs", "cbindgen.toml"]
outputs = ["include/takanawa.h"]

[tasks."package:android"]
description = "Build Android JNI libraries for all supported ABIs"
depends = ["header"]
run = "bash scripts/build-android.sh"
sources = ["crates/**/*.rs", "crates/**/Cargo.toml", "Cargo.toml", "Cargo.lock", "include/takanawa.h"]
outputs = ["target/android/jniLibs"]

[tasks."package:apple"]
description = "Build the Apple XCFramework and CocoaPods release zip"
depends = ["header"]
run = "bash scripts/build-apple-xcframework.sh"
sources = ["crates/**/*.rs", "crates/**/Cargo.toml", "Cargo.toml", "Cargo.lock", "include/takanawa.h", "include/module.modulemap"]
outputs = ["target/apple/Takanawa.xcframework", "target/cocoapods/Takanawa.xcframework.zip", "target/cocoapods/Takanawa.xcframework.zip.sha256"]

[tasks."package:cocoapods"]
description = "Alias for the CocoaPods release zip produced by package:apple"
depends = ["package:apple"]

[tasks."lint:cocoapods"]
description = "Lint the CocoaPods podspec against the locally packaged XCFramework"
depends = ["package:cocoapods"]
run = "bash -lc 'TAKANAWA_XCFRAMEWORK_URL=\"file://$(pwd)/target/cocoapods/Takanawa.xcframework.zip\" TAKANAWA_XCFRAMEWORK_SHA256=\"$(cat target/cocoapods/Takanawa.xcframework.zip.sha256)\" bundle exec pod spec lint Takanawa.podspec --verbose --allow-warnings'"
sources = ["Takanawa.podspec", "target/cocoapods/Takanawa.xcframework.zip", "target/cocoapods/Takanawa.xcframework.zip.sha256"]

[tasks."publish:cocoapods"]
description = "Publish the CocoaPods podspec to the trunk registry"
depends = ["lint:cocoapods"]
run = "bundle exec pod trunk push Takanawa.podspec --verbose --allow-warnings"

[tasks.package]
description = "Build all distributable platform artifacts"
depends = ["package:android", "package:cocoapods"]
