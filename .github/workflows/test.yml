name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2
      - run: mise run fmt
      - run: mise run clippy
      - run: mise run test

  js:
    name: JS packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run test:js

  android:
    name: Android checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4
      - run: mise run check
      - run: mise run check:android
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: android/takanawa-android/build/outputs/aar/takanawa-android-release.aar

  android-maven-local:
    name: Android Maven local dry-run
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4
      - run: mise run publish:android-local

  npm-publish-dry-run:
    name: npm publish dry-run
    runs-on: macos-latest
    if: github.ref_type != 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run package:apple
      - run: mise run npm:publish-dry-run

  csharp:
    name: C# binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run test:csharp
