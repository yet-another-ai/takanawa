name: Android

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-check:
    name: Android check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust workspace
        run: mise run check

      - name: Build Android native libraries
        run: mise run package:android

      - name: Run Android unit tests
        run: ./gradlew -Ptakanawa.skipRustBuild=true :takanawa-android:test

      - name: Run Capacitor Android unit tests
        run: ./gradlew -Ptakanawa.skipRustBuild=true :takanawa-capacitor:test

      - name: Build and verify Android release AAR
        run: ./gradlew -Ptakanawa.skipRustBuild=true :takanawa-android:assembleRelease :takanawa-android:verifyReleaseAar

      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: android/takanawa-android/build/outputs/aar/takanawa-android-release.aar

  android-publish-dry-run:
    name: Android Maven local dry-run
    runs-on: ubuntu-latest
    needs: android-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven local and build smoke app
        run: mise run publish:android-local
