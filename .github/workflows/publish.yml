name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PUBLISH_CRATES: takanawa-core takanawa-http takanawa-ffi takanawa-cli tauri-plugin-takanawa

jobs:
  publish:
    name: Publish crates.io
    runs-on: ubuntu-latest
    environment: cargo-registry
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: mise run publish:crates

  artifact-linux:
    name: Build Linux release artifact
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - name: Build Linux dynamic library
        run: mise run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-linux-x86_64
          path: target/dist/takanawa-linux-x86_64.tar.gz

  artifact-windows:
    name: Build Windows release artifact (${{ matrix.target }})
    runs-on: windows-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: takanawa-windows-x86_64
          - target: i686-pc-windows-msvc
            artifact: takanawa-windows-i686
          - target: aarch64-pc-windows-msvc
            artifact: takanawa-windows-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - name: Build Windows dynamic library
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}
          TAKANAWA_WINDOWS_ARTIFACT: ${{ matrix.artifact }}
        run: mise run dist:windows
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/dist/${{ matrix.artifact }}.zip

  artifact-apple:
    name: Build Apple release artifacts
    runs-on: macos-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - name: Build macOS dynamic library and Apple XCFramework
        run: mise run dist:macos-universal
      - name: Build Apple SwiftPM artifacts
        run: mise run dist:apple-swiftpm
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-macos-universal
          path: target/dist/takanawa-macos-universal.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: |
            target/dist/Takanawa.xcframework.zip
            target/dist/Takanawa.xcframework.zip.checksum
            target/dist/Package.swift

  artifact-android:
    name: Build Android release artifact
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android AAR and JNI libraries
        run: mise run dist:android
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-jniLibs
          path: target/dist/takanawa-android-jniLibs.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: target/dist/takanawa-android-release.aar

  publish-android:
    name: Publish Android SDK to Maven Central
    runs-on: ubuntu-latest
    needs: artifact-android
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Validate Maven Central secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
        run: cargo run -p xtask -- validate-maven-central-env

      - name: Build Android native libraries
        run: mise run package:android

      - name: Publish and release Android SDK on Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: mise run publish:android-central

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - publish
      - artifact-linux
      - artifact-windows
      - artifact-apple
      - artifact-android
      - publish-android
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: target/release-artifacts
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: cargo run -p xtask -- github-release

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    environment: npm-registry
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - run: mise run npm:publish
