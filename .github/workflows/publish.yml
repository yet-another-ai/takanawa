name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PUBLISH_CRATES: takanawa-core takanawa-http takanawa-ffi takanawa-cli tauri-plugin-takanawa
  SCCACHE_GHA_ENABLED: "true"

jobs:
  publish:
    name: Publish crates.io
    runs-on: ubuntu-latest
    environment: cargo-registry
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2

      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: mise run publish:crates

  artifact-linux:
    name: Build Linux release artifact
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Build Linux dynamic library
        run: mise run dist:linux
      - name: Build Linux GDExtension library
        run: |
          mise run package:gdextension-desktop
          mkdir -p target/dist
          tar -C target/gdextension -czf target/dist/takanawa-gdextension-linux-x86_64.tar.gz addons
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-linux-x86_64
          path: target/dist/takanawa-linux-x86_64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-gdextension-linux-x86_64
          path: target/dist/takanawa-gdextension-linux-x86_64.tar.gz

  artifact-windows:
    name: Build Windows release artifact (${{ matrix.target }})
    runs-on: windows-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: takanawa-windows-x86_64
          - target: i686-pc-windows-msvc
            artifact: takanawa-windows-i686
          - target: aarch64-pc-windows-msvc
            artifact: takanawa-windows-aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Build Windows dynamic library
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}
          TAKANAWA_WINDOWS_ARTIFACT: ${{ matrix.artifact }}
        run: mise run dist:windows
      - name: Build Windows GDExtension library
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}
        run: |
          mise run package:gdextension-desktop
          mkdir target/dist
          tar -C target/gdextension -czf target/dist/takanawa-gdextension-${{ matrix.artifact }}.tar.gz addons
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/dist/${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-gdextension-${{ matrix.artifact }}
          path: target/dist/takanawa-gdextension-${{ matrix.artifact }}.tar.gz

  artifact-apple:
    name: Build Apple release artifacts
    runs-on: macos-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Build macOS dynamic library and Apple XCFramework
        run: mise run dist:macos-universal
      - name: Build Apple SwiftPM artifacts
        run: mise run dist:apple-swiftpm
      - name: Build Apple GDExtension libraries
        run: |
          mise run package:gdextension-ios
          mkdir -p target/dist
          tar -C target/gdextension -czf target/dist/takanawa-gdextension-apple.tar.gz addons
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-macos-universal
          path: target/dist/takanawa-macos-universal.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: |
            target/dist/Takanawa.xcframework.zip
            target/dist/Takanawa.xcframework.zip.checksum
            target/dist/Package.swift
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-gdextension-apple
          path: target/dist/takanawa-gdextension-apple.tar.gz

  artifact-android:
    name: Build Android release artifact
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android AAR and JNI libraries
        run: mise run dist:android
      - name: Build Android GDExtension libraries
        run: |
          mise run package:gdextension-android
          mkdir -p target/dist
          tar -C target/gdextension -czf target/dist/takanawa-gdextension-android.tar.gz addons
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-jniLibs
          path: target/dist/takanawa-android-jniLibs.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: target/dist/takanawa-android-release.aar
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-gdextension-android
          path: target/dist/takanawa-gdextension-android.tar.gz

  publish-android:
    name: Publish Android SDK to Maven Central
    runs-on: ubuntu-latest
    needs: artifact-android
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: gradle/actions/setup-gradle@v4

      - name: Validate Maven Central secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_ID: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
        run: cargo run -p xtask -- validate-maven-central-env

      - name: Build Android native libraries
        run: mise run package:android

      - name: Publish and release Android SDK on Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: mise run publish:android-central

  artifact-gdextension:
    name: Package Godot GDExtension addon
    runs-on: ubuntu-latest
    needs:
      - artifact-linux
      - artifact-windows
      - artifact-apple
      - artifact-android
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: actions/download-artifact@v4
        with:
          pattern: takanawa-gdextension-*
          path: target/gdextension-platform-artifacts
      - name: Merge platform GDExtension artifacts
        shell: bash
        run: |
          mkdir -p target/gdextension
          for archive in target/gdextension-platform-artifacts/*/*.tar.gz; do
            tar -xzf "$archive" -C target/gdextension
          done
          mise run dist:gdextension
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-gdextension
          path: target/dist/takanawa-gdextension.zip

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - publish
      - artifact-linux
      - artifact-windows
      - artifact-apple
      - artifact-android
      - artifact-gdextension
      - publish-android
      - publish-nuget
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: target/release-artifacts
          merge-multiple: true
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: cargo run -p xtask -- github-release

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: artifact-apple
    environment: npm-registry
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: actions/download-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: target/swiftpm
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - run: mise run npm:publish

  publish-nuget:
    name: Publish C# SDK to NuGet
    runs-on: ubuntu-latest
    needs:
      - artifact-linux
      - artifact-windows
      - artifact-apple
      - artifact-android
    environment: nuget-registry
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: actions/download-artifact@v4
        with:
          path: target/release-artifacts
          merge-multiple: true
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Prepare NuGet native assets
        run: cargo run -p xtask -- prepare-csharp-nuget-assets
      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USERNAME }}
      - name: Publish NuGet package
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: mise run nuget:publish
      - uses: actions/upload-artifact@v4
        with:
          name: YetAnotherAI.Takanawa-nuget
          path: target/csharp/package/*.nupkg
