name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux:
    name: Linux release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run build:desktop

  windows:
    name: Windows release build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup target add ${{ matrix.target }}
      - run: mise run header
      - run: cargo build -p takanawa-ffi --release --locked --target ${{ matrix.target }}

  android:
    name: Android AAR release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: android-actions/setup-android@v4
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4
      - run: mise run package:android-aar
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: android/takanawa-android/build/outputs/aar/takanawa-android-release.aar

  apple:
    name: Apple XCFramework build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run package:apple
      - run: mise run test:swift-integration
      - uses: actions/upload-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: |
            target/swiftpm/Takanawa.xcframework.zip
            target/swiftpm/Takanawa.xcframework.zip.checksum
