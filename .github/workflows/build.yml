name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: "true"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - run: mise run build:desktop
      - run: mise run package:gdextension-desktop

  windows:
    name: Windows release build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - run: mise run build:windows-ffi
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}
      - run: mise run package:gdextension-desktop
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}

  android:
    name: Android AAR release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: gradle/actions/setup-gradle@v4
      - run: mise run package:android-aar
      - run: mise run publish:android-local
      - run: mise run package:gdextension-android
      - run: mise run test:capacitor-android
      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: ./gradlew :android-maven-local-smoke:connectedDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: android/takanawa-android/build/outputs/aar/takanawa-android-release.aar

  apple:
    name: Apple XCFramework build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache for Rust builds
        shell: bash
        run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - run: mise run check:apple
      - run: mise run package:gdextension-ios
      - uses: actions/upload-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: |
            target/swiftpm/Takanawa.xcframework.zip
            target/swiftpm/Takanawa.xcframework.zip.checksum

  csharp:
    name: C# binding build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.6
          experimental: true
      - run: mise run build:csharp
