name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - uses: Swatinem/rust-cache@v2
      - run: mise run build:desktop

  windows:
    name: Windows release build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run build:windows-ffi
        env:
          TAKANAWA_WINDOWS_TARGET: ${{ matrix.target }}

  android:
    name: Android AAR release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - uses: gradle/actions/setup-gradle@v4
      - run: mise run package:android-aar
      - run: mise run test:capacitor-android
      - uses: actions/upload-artifact@v4
        with:
          name: takanawa-android-aar
          path: android/takanawa-android/build/outputs/aar/takanawa-android-release.aar

  apple:
    name: Apple XCFramework build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: Swatinem/rust-cache@v2
      - run: mise run check:apple
      - uses: actions/upload-artifact@v4
        with:
          name: Takanawa.xcframework-swiftpm
          path: |
            target/swiftpm/Takanawa.xcframework.zip
            target/swiftpm/Takanawa.xcframework.zip.checksum

  csharp:
    name: C# binding build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - run: mise run build:csharp
