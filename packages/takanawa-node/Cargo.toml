[package]
name = "takanawa-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["cdylib"]
name = "takanawa_node"

[features]
default = ["tls-rustls"]
tls-rustls = ["takanawa-http/tls-rustls"]
tls-platform-native = ["takanawa-http/tls-platform-native"]
tls-platform-roots = ["tls-platform-native"]

[dependencies]
napi.workspace = true
napi-derive.workspace = true
takanawa-core.workspace = true
takanawa-http = { workspace = true, default-features = false }
tokio.workspace = true

[lints]
workspace = true

[build-dependencies]
napi-build = "2.3.2"
